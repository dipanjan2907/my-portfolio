<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="100" height="100" rx="25" fill="#0f172a" />
  <rect width="100" height="100" rx="25" fill="url(#grad)" opacity="0.2" />
  <text x="50" y="68" font-family="'Inter', sans-serif" font-size="55" font-weight="800" fill="white" text-anchor="middle" filter="url(#glow)">D</text>
</svg>
